spring:
  threads:
    virtual:
      enabled: true

gearnest:
  session:
    question-limit: 5
    ttl-hours: 2
    inflight-ttl-seconds: 90
  rag:
    semantic-k: 2
    negative-k: 1
    spec-k: 1
    overfetch: 5
    mmr-lambda: 0.7
    first-token-timeout-seconds: 10
  huggingface:
    api-key: test-key
    embedding-model: BAAI/bge-small-en-v1.5
    chat-model: mistralai/Mistral-7B-Instruct-v0.3
    base-url: http://localhost:9

logging:
  level:
    io.gearnest: DEBUG
